<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(36, 179, 179);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            

        }
        section{
            background-color: rgb(26, 201, 201);
            padding: 20px;
            width: 80vw;
            height: 500px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.415);
            color: white;
            overflow: hidden;
        }
        h1{
            font-size: 2.2em;
            text-align: center;
            margin-bottom: 10px;
        }
        span{font-weight: bold;}
        .bt-container{
            display: flex;
            width: 100%;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        input{
            width: 100%;
            height: 40px;
            text-align: center;
            border: none;
            border-radius: 5px;
        }
            input[type="button"] {
            height: 40px;
            padding: 0 20px;
            background-color: #fff;
            color: rgb(26, 201, 201);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        input[type="button"]:hover {
            background-color: #e0f7f7;
        }
        div#res{
            display: flex;
            margin-top: 5px;
            height: 80%;
            background-color: aquamarine;
            justify-content: center;
            align-items: center;
            font-size: 5em;
            border-radius: 5px;
        }
        </style>
</head>
<body>
    <main>
        <section>
            <h1>Somando Valores</h1>
            <div class="bt-container">
                <input type="number" name="txtn1" id="txtn1">
                <span>+</span>
                <input type="number" name="txtn2" id="txtn2">
                <input type="button" value="Somar" onclick="somar()">
            </div>
            <div id="res">=</div>
        </section>
    </main>

    <script>
        function somar(){
            var tn1 = window.document.getElementById(`txtn1`)
            var tn2 = window.document.querySelector(`input#txtn2`)
            var res = window.document.getElementById(`res`)
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var soma = n1 + n2
            res.innerHTML = soma
        }
    </script>
</body>
</html>
