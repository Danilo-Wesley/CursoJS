<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa...</title>
    <style>
        body{
            background-color: rgb(79, 190, 220);
            color: white;
            font: normal 20pt Arial;
        }
        h1{
            background-color: rgba(0, 255, 255, 0.49);
            border-radius: 10px;
            color: rgb(251, 255, 0);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei de todo mal</p>

    <script>
        var n1 = Number.parseFloat(window.prompt("Digite um Número: ")) // Sem colocar o number e parse Int (q é pra conversao) a linguagem identifica como String (assim ele força ser Float)
        var n2 = Number(window.prompt("Digite um segundo Número: ")) // assim o JS decidi qual o melhor
        var soma = n1 + n2
        window.alert(`A soma dos valores ${n1} e ${n2} é igual a ${soma}`) //Template String usando placeholder
        /*  (number + number) para adição
            (String + String) para concatenação   */

            
            
            /*  Formatando Strings
            Para converter para String é String(n) ou n.toString 
            s.length > conta quantos caracteres a string tem
            s.toUpperCase() > tudo para MAIÚSCULAS
            s.toLowerCase > tudo para minúsculas
            */
    </script>
</body>
</html>`
