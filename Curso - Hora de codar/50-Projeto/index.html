<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do JavaScript</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <div id="task-container">
        <div id="task-header">
            <h2>Salve a sua próxima tarefa</h2>
            <form action="" id="add-task-forms">
                <input type="text" name="task-title" id="task-title" placeholder="O que você vai fazer?">
                <button id="add=btn" type="submit"> 
                    <ion-icon name="add-outline" ></ion-icon>
                </button>
            </form>
        </div>
        <div id="task-list-container">
            <h2>Estas sãos as suas tarefas:</h2>
            <ul id="task-list">
                <li class="task-box">
                    <span class="task-title">Teste 1</span>
                    <ion-icon name="checkmark-outline" class="done-btn"></ion-icon>
                    <ion-icon name="close-outline" class="remove-btn"></ion-icon>
                </li>
                    <li class="task-box">
                    <span class="task-title">Teste 2</span>
                    <ion-icon name="checkmark-outline" class="done-btn"></ion-icon>
                    <ion-icon name="close-outline" class="remove-btn"></ion-icon>
                </li>
                    <li class="task-box">
                    <span class="task-title">Teste 3</span>
                    <ion-icon name="checkmark-outline" class="done-btn"></ion-icon>
                    <ion-icon name="close-outline" class="remove-btn"></ion-icon>
                </li>
            </ul>
        </div>
    </div>





    <script src="js/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>
</html>
