<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>Sistemas de Multas</h1>
    <span>Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> Km/h</span>
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="rest"></div>

    <script>
        function calcular(){
            var txtv = window.document.getElementById('txtvel')
            var vel = Number(txtv.value)
            var rest = window.document.querySelector('div#rest')
            rest.innerHTML = `<p> Sua Velocidade atual é de <strong> ${vel} km/h </strong> </p>`
                if(vel > 60){
                rest.innerHTML += '<p> Você está <strong>MULTADO</strong> por excesso de Velocidade </p>'
            }else{
                rest.innerHTML += '<p>Você está dentro da velocidade permitda!</p>'
            }
            rest.innerHTML += `<p> Diriga sempre com cinto de segurança!`
        
        }

    </script>
</body>
</html>
